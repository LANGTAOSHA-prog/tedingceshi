<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>建設分野 特定技能2号 模擬試験 60問</title>
<style>
:root {
  --bg:#07131f;
  --card:#0f2235;
  --card2:#132b42;
  --line:#234762;
  --text:#eaf2f8;
  --muted:#91a9bb;
  --gold:#d6a82f;
  --gold2:#f0c95a;
  --green:#1fa971;
  --red:#d84b4b;
  --blue:#3388d8;
  --shadow:0 18px 50px rgba(0,0,0,.35);
}
* { box-sizing:border-box; }
body {
  margin:0;
  background:
    radial-gradient(circle at top left, rgba(214,168,47,.13), transparent 30%),
    radial-gradient(circle at bottom right, rgba(51,136,216,.14), transparent 35%),
    var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP","Noto Sans SC",Arial,sans-serif;
  line-height:1.65;
}
.app {
  width:min(100%, 980px);
  margin:0 auto;
  padding:18px;
}
.header {
  background:linear-gradient(135deg, #10283d, #091827);
  border:1px solid var(--line);
  border-radius:22px;
  padding:22px;
  box-shadow:var(--shadow);
  position:sticky;
  top:0;
  z-index:10;
}
.title {
  margin:0 0 6px;
  font-size:clamp(21px, 4vw, 32px);
  font-weight:900;
  color:var(--gold2);
  letter-spacing:.03em;
}
.sub {
  color:var(--muted);
  font-size:14px;
  margin:0;
}
.progress-wrap {
  margin-top:16px;
  height:12px;
  background:#07131f;
  border:1px solid var(--line);
  border-radius:99px;
  overflow:hidden;
}
.progress {
  width:0%;
  height:100%;
  background:linear-gradient(90deg,var(--gold),var(--green));
  transition:.25s;
}
.info-row {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:14px;
}
.badge {
  border:1px solid var(--line);
  background:#0b1b2a;
  color:var(--text);
  border-radius:99px;
  padding:7px 11px;
  font-size:13px;
}
.main {
  margin-top:18px;
}
.card {
  background:linear-gradient(180deg, var(--card), #0b1b2a);
  border:1px solid var(--line);
  border-radius:22px;
  padding:22px;
  box-shadow:var(--shadow);
}
.part {
  color:var(--gold2);
  font-weight:800;
  font-size:14px;
  margin-bottom:8px;
}
.qno {
  color:#bcd2e4;
  font-weight:800;
  margin-bottom:8px;
}
.question {
  font-size:clamp(18px, 3.5vw, 24px);
  font-weight:900;
  margin:8px 0 20px;
}
.options {
  display:grid;
  gap:12px;
}
.option {
  width:100%;
  text-align:left;
  border:1px solid var(--line);
  background:var(--card2);
  color:var(--text);
  border-radius:16px;
  padding:15px 16px;
  font-size:16px;
  cursor:pointer;
  transition:.15s ease;
  display:flex;
  gap:10px;
  align-items:flex-start;
}
.option:hover {
  transform:translateY(-1px);
  border-color:var(--gold);
}
.option .mark {
  flex:0 0 28px;
  height:28px;
  border-radius:50%;
  background:#07131f;
  border:1px solid var(--line);
  display:grid;
  place-items:center;
  font-weight:900;
  color:var(--gold2);
}
.option.selected {
  border-color:var(--gold2);
  background:#263b26;
}
.option.correct {
  border-color:var(--green);
  background:rgba(31,169,113,.20);
}
.option.wrong {
  border-color:var(--red);
  background:rgba(216,75,75,.20);
}
.explain {
  display:none;
  margin-top:18px;
  padding:16px;
  border-radius:16px;
  border:1px solid var(--line);
  background:#07131f;
}
.explain.show { display:block; }
.explain b.correct-text { color:var(--green); }
.explain b.wrong-text { color:var(--red); }
.nav {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:18px;
}
button {
  border:none;
  border-radius:15px;
  padding:14px 16px;
  font-weight:900;
  font-size:15px;
  cursor:pointer;
}
.btn {
  background:#162f47;
  color:var(--text);
  border:1px solid var(--line);
}
.btn-primary {
  background:linear-gradient(135deg,var(--gold),#b77c13);
  color:#121212;
}
.btn-danger {
  background:linear-gradient(135deg,var(--red),#a93232);
  color:white;
}
.grid-actions {
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:12px;
  margin-top:12px;
}
.result {
  display:none;
  margin-top:18px;
}
.result.show { display:block; }
.score {
  font-size:clamp(28px, 8vw, 54px);
  font-weight:1000;
  color:var(--gold2);
  margin:6px 0;
}
.pass {
  color:var(--green);
  font-weight:900;
  font-size:22px;
}
.fail {
  color:var(--red);
  font-weight:900;
  font-size:22px;
}
.review {
  margin-top:16px;
  display:grid;
  gap:10px;
}
.review-item {
  border:1px solid var(--line);
  background:#0b1b2a;
  border-radius:14px;
  padding:12px;
  font-size:14px;
}
.footer-note {
  color:var(--muted);
  text-align:center;
  font-size:13px;
  margin:18px 0 6px;
}
@media (max-width:640px) {
  .app { padding:10px; }
  .header { border-radius:16px; padding:16px; }
  .card { border-radius:16px; padding:16px; }
  .nav { grid-template-columns:1fr; }
  .grid-actions { grid-template-columns:1fr; }
  .option { padding:14px; font-size:15px; }
  .header { position:static; }
}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <h1 class="title">建設分野 特定技能2号 模擬試験 60問</h1>
    <p class="sub">第1部30問＋第2部高難度30問｜クリック選択・自動採点・スマホ/PC対応</p>
    <div class="progress-wrap"><div class="progress" id="progress"></div></div>
    <div class="info-row">
      <span class="badge" id="countBadge">0 / 60</span>
      <span class="badge" id="answeredBadge">解答済み：0問</span>
      <span class="badge">合格目安：85%以上</span>
    </div>
  </header>

  <main class="main">
    <section class="card" id="quizCard">
      <div class="part" id="part"></div>
      <div class="qno" id="qno"></div>
      <div class="question" id="question"></div>
      <div class="options" id="options"></div>
      <div class="explain" id="explain"></div>
      <div class="nav">
        <button class="btn" onclick="prevQuestion()">← 前の問題</button>
        <button class="btn-primary" onclick="nextQuestion()">次の問題 →</button>
      </div>
      <div class="grid-actions">
        <button class="btn" onclick="showAnswer()">答えを確認</button>
        <button class="btn" onclick="finishExam()">採点する</button>
        <button class="btn-danger" onclick="resetExam()">最初からやり直す</button>
      </div>
    </section>

    <section class="card result" id="result">
      <div class="part">試験結果</div>
      <div class="score" id="scoreText"></div>
      <div id="judgeText"></div>
      <div class="review" id="review"></div>
      <div class="grid-actions">
        <button class="btn-primary" onclick="goQuestion(0)">第1問に戻る</button>
        <button class="btn-danger" onclick="resetExam()">再挑戦する</button>
      </div>
    </section>
  </main>
  <div class="footer-note">保存してオフラインでも使用できます。画像問題を追加したい場合は image: "images/q1.jpg" をデータに入れてください。</div>
</div>

    "q": "特定技能2号レベルの技能者に求められる姿勢として、最も適切なものはどれか。",
    "opts": [
      "自分の作業だけを行い、周囲の危険には関わらない",
      "作業品質、安全、工程を理解し、必要に応じて後輩や作業員を指導する",
      "指示がなくても安全手順を省略して効率を上げる",
      "書類や手順書は管理者だけが理解すればよい"
    ],
    "ans": 1,
    "exp": "特定技能2号レベルでは、熟練技能だけでなく、安全・品質・工程を理解し、指導できる力が求められる。",
    "part": "第2部・高難度問題"
  }
];
let current = 0;
let answers = Array(questions.length).fill(null);

function $(id) { return document.getElementById(id); }

function renderQuestion() {
  const q = questions[current];
  $("part").textContent = q.part;
  $("qno").textContent = `第${current + 1}問 / ${questions.length}問`;
  $("question").textContent = q.q;

  const options = $("options");
  options.innerHTML = "";
  q.opts.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "option";
    if (answers[current] === i) btn.classList.add("selected");
    btn.innerHTML = `<span class="mark">${String.fromCharCode(65+i)}</span><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(i);
    options.appendChild(btn);
  });

  $("explain").className = "explain";
  $("explain").innerHTML = "";
  updateHeader();
  $("result").classList.remove("show");
}

function selectAnswer(i) {
  answers[current] = i;
  showAnswer();
  updateHeader();
  setTimeout(() => {
    if (current < questions.length - 1) {
      current++;
      renderQuestion();
      window.scrollTo({top:0, behavior:"smooth"});
    }
  }, 450);
}

function showAnswer() {
  const q = questions[current];
  const buttons = document.querySelectorAll(".option");
  buttons.forEach((btn, i) => {
    btn.classList.remove("selected","correct","wrong");
    if (i === q.ans) btn.classList.add("correct");
    if (answers[current] === i && i !== q.ans) btn.classList.add("wrong");
  });
  const selected = answers[current];
  const correctLetter = String.fromCharCode(65 + q.ans);
  let selectedText = selected === null ? "未解答" : String.fromCharCode(65 + selected);
  $("explain").className = "explain show";
  $("explain").innerHTML = `
    <div><b class="correct-text">正解：${correctLetter}. ${q.opts[q.ans]}</b></div>
    <div>あなたの解答：${selectedText}</div>
    <div style="margin-top:8px;">解説：${q.exp}</div>
  `;
}

function nextQuestion() {
  if (current < questions.length - 1) {
    current++;
    renderQuestion();
    window.scrollTo({top:0, behavior:"smooth"});
  } else {
    finishExam();
  }
}

function prevQuestion() {
  if (current > 0) {
    current--;
    renderQuestion();
    window.scrollTo({top:0, behavior:"smooth"});
  }
}

function goQuestion(n) {
  current = n;
  renderQuestion();
  window.scrollTo({top:0, behavior:"smooth"});
}

function updateHeader() {
  const answered = answers.filter(a => a !== null).length;
  $("countBadge").textContent = `${current + 1} / ${questions.length}`;
  $("answeredBadge").textContent = `解答済み：${answered}問`;
  $("progress").style.width = `${Math.round(((current+1)/questions.length)*100)}%`;
}

function finishExam() {
  let correct = 0;
  questions.forEach((q, i) => {
    if (answers[i] === q.ans) correct++;
  });
  const percent = Math.round(correct / questions.length * 100);
  $("result").classList.add("show");
  $("scoreText").textContent = `${correct} / ${questions.length}問　${percent}%`;
  $("judgeText").innerHTML = percent >= 85
    ? `<div class="pass">合格レベルです。</div>`
    : `<div class="fail">不合格レベルです。85%以上を目指してください。</div>`;

  const review = $("review");
  review.innerHTML = "";
  questions.forEach((q, i) => {
    const user = answers[i];
    if (user !== q.ans) {
      const div = document.createElement("div");
      div.className = "review-item";
      div.innerHTML = `
        <b>第${i+1}問：</b>${q.q}<br>
        あなたの解答：${user === null ? "未解答" : String.fromCharCode(65+user) + ". " + q.opts[user]}<br>
        正解：${String.fromCharCode(65+q.ans)}. ${q.opts[q.ans]}<br>
        解説：${q.exp}
      `;
      review.appendChild(div);
    }
  });
  if (review.innerHTML === "") {
    review.innerHTML = `<div class="review-item">全問正解です。すばらしいです。</div>`;
  }
  window.scrollTo({top:document.body.scrollHeight, behavior:"smooth"});
}

function resetExam() {
  if (!confirm("解答をすべてリセットしますか？")) return;
  answers = Array(questions.length).fill(null);
  current = 0;
  renderQuestion();
}

renderQuestion();
</script>
</body>
</html>
